<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book a Cleaning | CleanPro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="wrap">
    <section id="booking" class="card" style="max-width:500px;margin:auto;">
      <h2>Book Your Cleaning</h2>
      <form id="bookingForm" class="booking-form">
        <input name="name" type="text" placeholder="Your Name" required><br>

        <input name="email" type="email" placeholder="Your Email" required><br>

        <input name="phone" type="tel" placeholder="Phone Number" required><br>

        <label for="service">Choose Service</label><br>
        <select name="service" id="service" required>
          <option value="">-- Select a Service --</option>
          <option value="Standard Cleaning">Standard Cleaning ($99)</option>
          <option value="Deep Cleaning">Deep Cleaning ($149)</option>
          <option value="Office Cleaning">Office Cleaning ($199)</option>
        </select><br>

        <label for="date">Date</label><br>
        <input id="date" type="date" name="date" required><br>

        <label for="time">Time</label><br>
        <input type="time" name="time" required><br>

        <textarea name="notes" placeholder="Special requests (optional)"></textarea><br>

        <button type="submit" class="btn stripe">Book Now</button>
      </form>
      <p id="status"></p>
    </section>
  </main>

  <script>
    // Auto-fill today's date
    document.getElementById("date").valueAsDate = new Date();

    document.getElementById("bookingForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const booking = Object.fromEntries(new FormData(e.target).entries());
      document.getElementById("status").innerText = "Loading...";

      try {
        const res = await fetch("/createBooking", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(booking),
        });
        const out = await res.json();

        if (out.ok) {
          // Redirect to confirmation page
          window.location.href = "confirmation.html";
        } else {
          document.getElementById("status").innerText = `❌ Error: ${out.error}`;
        }
      } catch {
        document.getElementById("status").innerText = "❌ Failed to connect";
      }
    });
  </script>
</body>
</html>
