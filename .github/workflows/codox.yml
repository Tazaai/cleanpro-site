name: Codox Diagnostics

on:
  workflow_dispatch:

permissions:
  contents: write   # ✅ Needed for pushing to reports branch

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      # ✅ Authenticate to Google Cloud
      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ✅ Set up gcloud CLI
      - name: ⚙️ Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT }}

      # ✅ Verify auth
      - name: 🔎 Verify gcloud authentication
        run: |
          gcloud auth list
          gcloud config set project ${{ secrets.GCP_PROJECT }}
          gcloud config set run/region europe-west1
          gcloud info

      # ✅ Diagnostics, deploy, and API validation
      - name: 🔁 Run diagnostics and deploy (x3)
        run: |
          chmod +x ./review_report.sh ./deploy_backend.sh ./deploy_frontend.sh
          BACKEND_URL="https://cleanpro-backend-5539254765.europe-west1.run.app"
          FAIL_COUNT=0

          for i in {1..3}; do
            echo "🧠 Cycle $i: Running diagnostics..."
            ./review_report.sh || { echo "⚠️ Diagnostics failed"; FAIL_COUNT=$((FAIL_COUNT+1)); }

            echo "🚀 Deploying backend..."
            ./deploy_backend.sh || { echo "❌ Backend deploy failed"; FAIL_COUNT=$((FAIL_COUNT+1)); }

            echo "🚀 Deploying frontend..."
            ./deploy_frontend.sh || { echo "❌ Frontend deploy failed"; FAIL_COUNT=$((FAIL_COUNT+1)); }

            echo "🌐 API checks..."
            for endpoint in coordination_points pricing bookings; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BACKEND_URL/api/$endpoint")
              if [ "$STATUS" = "200" ]; then
                echo "✅ /api/$endpoint OK"
              else
                echo "⚠️ /api/$endpoint failed ($STATUS)"
                FAIL_COUNT=$((FAIL_COUNT+1))
              fi
            done
          done

          echo "Failures: $FAIL_COUNT"
          echo "$FAIL_COUNT" > fail_count.txt
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}

      # ✅ Collect logs for AI analysis
      - name: 🧩 Collect logs and reference
        if: always()
        run: |
          mkdir -p codox_logs
          gcloud run services logs read cleanpro-backend --limit=300 --format="value(textPayload)" > codox_logs/backend_logs.txt
          cat agent.md > codox_logs/review_reference.txt
          echo "🧠 Logs prepared for Codox GPT analysis."

      # ✅ Auto-Correction via Codox GPT
      - name: 🤖 Codox Auto-Correction
        if: always()
        run: |
          echo "🔍 Running Codox Auto-Correction via GitHub connection..."
          npx codox fix --auto --project cleanpro-site --branch main --use-github || echo "⚠️ Codox auto-correction skipped or not available."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ✅ Push diagnostics summary to reports branch
      - name: 📊 Push diagnostic summary to reports branch
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "Codox Bot"
          git config --global user.email "codox@bot.local"
          mkdir -p reports
          cp agent.md reports/$(date +'%Y-%m-%d_%H-%M')_report.md
          git checkout -B reports
          git add reports/
          git commit -m "Add diagnostic report $(date +'%Y-%m-%d %H:%M')" || echo "No new changes"
          git push origin reports --force
