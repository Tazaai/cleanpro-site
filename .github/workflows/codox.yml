name: Codox Diagnostics

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      # ✅ Google Cloud authentication
      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: ⚙️ Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT }}

      - name: 🔎 Verify gcloud authentication
        run: |
          gcloud auth list
          gcloud config set project ${{ secrets.GCP_PROJECT }}
          gcloud config set run/region europe-west1
          gcloud info

      # ✅ Run diagnostic report
      - name: 📋 Run diagnostic script
        id: diagnostics
        run: |
          chmod +x ./review_report.sh
          ./review_report.sh
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}

      # ✅ Collect logs (non-blocking if no permission)
      - name: 🧠 Collect logs and reference
        if: always()
        continue-on-error: true
        run: |
          mkdir -p codox_logs
          gcloud run services logs read cleanpro-backend --limit=300 --format="value(textPayload)" > codox_logs/backend_logs.txt || echo "⚠️ Unable to fetch Cloud Run logs"
          cp agent.md codox_logs/review_reference.txt || echo "⚠️ No agent.md found"
          echo "🧠 Logs prepared for Codox GPT analysis."

      # ✅ Smart Codox Auto-Correction with retry
      - name: 🤖 Codox Auto-Correction & Redeploy (smart retry)
        if: failure() || steps.diagnostics.outputs.errors != '0'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔍 Errors detected (${{ steps.diagnostics.outputs.errors }}). Running Codox self-healing..."
          MAX_RETRIES=2
          for i in $(seq 1 $MAX_RETRIES); do
            echo "🧠 Attempt $i of $MAX_RETRIES"
            npx codox fix --auto --commit --push \
              --project cleanpro-site \
              --branch main \
              --use-github \
              --max-fixes 5 \
              --redeploy "bash ./deploy_backend.sh && bash ./deploy_frontend.sh" && break
            echo "⚠️ Codox fix failed (attempt $i)"
            sleep 10
          done
          echo "✅ Codox process complete."

      # ✅ Push diagnostic summary to reports branch
      - name: 📊 Push diagnostic summary to reports branch
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "Codox Bot"
          git config --global user.email "codox@bot.local"
          mkdir -p reports
          cp agent.md reports/$(date +'%Y-%m-%d_%H-%M')_report.md
          git checkout -B reports
          git add reports/
          git commit -m "Add diagnostic report $(date +'%Y-%m-%d %H:%M')" || echo "No new changes"
          git push origin reports --force
