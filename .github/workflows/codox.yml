name: Codox Diagnostics

on:
  workflow_dispatch:   # Manual trigger only

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      # ✅ Authenticate to Google Cloud BEFORE any gcloud usage
      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ✅ Set up gcloud CLI
      - name: ⚙️ Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT }}
          export_default_credentials: true

      # ✅ Verify gcloud authentication and project
      - name: 🔎 Verify gcloud authentication
        run: |
          gcloud auth list
          gcloud config set project ${{ secrets.GCP_PROJECT }}
          gcloud config set run/region europe-west1
          gcloud info

      # ✅ Cyclic diagnostics + deploy (3 rounds)
      - name: 🔁 Run diagnostics and deploy (x3)
        run: |
          chmod +x ./review_report.sh
          chmod +x ./deploy_backend.sh
          chmod +x ./deploy_frontend.sh

          for i in {1..3}; do
            echo "🧠 Cycle $i: Running diagnostics..."
            ./review_report.sh || echo "⚠️ Diagnostics failed, continuing..."
            
            echo "🚀 Cycle $i: Deploying backend..."
            ./deploy_backend.sh || echo "❌ Backend deploy failed"

            echo "🚀 Cycle $i: Deploying frontend..."
            ./deploy_frontend.sh || echo "❌ Frontend deploy failed"
          done
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
