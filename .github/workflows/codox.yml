name: Codox Diagnostics

on:
  workflow_dispatch:   # Manual trigger only

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: ⚙️ Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          export_default_credentials: true

      - name: 🔐 Authenticate gcloud
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > $HOME/gcloud-key.json
          gcloud auth activate-service-account --key-file=$HOME/gcloud-key.json
          gcloud config set project ${{ secrets.GCP_PROJECT }}
          gcloud config set run/region europe-west1
          gcloud auth list
          gcloud config list project

      - name: 🧠 Run CleanPro Diagnostics
        run: |
          chmod +x ./review_report.sh
          ./review_report.sh
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}

      - name: 🚀 Deploy Backend & Frontend
        run: |
          chmod +x ./deploy_backend.sh
          chmod +x ./deploy_frontend.sh
          echo "▶️ Deploying Backend..."
          bash ./deploy_backend.sh || { echo "❌ Backend deploy failed"; exit 1; }
          echo "▶️ Deploying Frontend..."
          bash ./deploy_frontend.sh || { echo "❌ Frontend deploy failed"; exit 1; }
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
