name: Codox Diagnostics

on:
  workflow_dispatch:   # manual trigger in Codox

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run CleanPro diagnostics & deploy
        run: |
          chmod +x ./review_report.sh
          ./review_report.sh
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          CLOUDSDK_CORE_PROJECT: ${{ secrets.GCP_PROJECT }}
